<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- 8-pointed star center -->
  <path d="M60,15 L70,35 L90,30 L75,45 L80,65 L60,52 L40,65 L45,45 L30,30 L50,35 Z" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.25"/>
  <path d="M60,22 L67,36 L82,33 L72,43 L75,58 L60,49 L45,58 L48,43 L38,33 L53,36 Z" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Top-left corner star -->
  <path d="M0,0 L10,20 L30,15 L15,30 L20,50 L0,37 L-20,50 L-15,30 L-30,15 L-10,20 Z" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.25"/>
  <!-- Top-right corner -->
  <path d="M120,0 L130,20 L150,15 L135,30 L140,50 L120,37 L100,50 L105,30 L90,15 L110,20 Z" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.25"/>
  <!-- Bottom-left corner -->
  <path d="M0,120 L10,140 L30,135 L15,150 L20,170 L0,157 L-20,170 L-15,150 L-30,135 L-10,140 Z" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.25"/>
  <!-- Bottom-right corner -->
  <path d="M120,120 L130,140 L150,135 L135,150 L140,170 L120,157 L100,170 L105,150 L90,135 L110,140 Z" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.25"/>
  
  <!-- Connecting diagonal lines -->
  <line x1="50" y1="35" x2="10" y2="20" stroke="#D4AF37" stroke-width="0.4" opacity="0.12"/>
  <line x1="70" y1="35" x2="110" y2="20" stroke="#D4AF37" stroke-width="0.4" opacity="0.12"/>
  <line x1="45" y1="45" x2="20" y2="50" stroke="#D4AF37" stroke-width="0.4" opacity="0.12"/>
  <line x1="75" y1="45" x2="100" y2="50" stroke="#D4AF37" stroke-width="0.4" opacity="0.12"/>
  <line x1="40" y1="65" x2="15" y2="90" stroke="#D4AF37" stroke-width="0.4" opacity="0.12"/>
  <line x1="80" y1="65" x2="105" y2="90" stroke="#D4AF37" stroke-width="0.4" opacity="0.12"/>
  <line x1="50" y1="35" x2="60" y2="15" stroke="#D4AF37" stroke-width="0.4" opacity="0.12"/>
  <line x1="70" y1="35" x2="60" y2="15" stroke="#D4AF37" stroke-width="0.4" opacity="0.12"/>
  
  <!-- Small diamond accents at edge midpoints -->
  <rect x="58" y="-2" width="4" height="4" transform="rotate(45,60,0)" fill="#D4AF37" opacity="0.15"/>
  <rect x="-2" y="58" width="4" height="4" transform="rotate(45,0,60)" fill="#D4AF37" opacity="0.15"/>
  <rect x="118" y="58" width="4" height="4" transform="rotate(45,120,60)" fill="#D4AF37" opacity="0.15"/>
  <rect x="58" y="118" width="4" height="4" transform="rotate(45,60,120)" fill="#D4AF37" opacity="0.15"/>
</svg>
